# Phase 0 smoke test: prove the GUI boots headless (no GPU) and the Phase-0 gates
# assert. Heavy per-OS release builds live in build-release.yml.
name: smoke-test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # 3.14 wheels lag for GUI/scraper deps
      - run: pip install -e ".[gui,dev]"
      - name: Ruff
        run: ruff check .
      - name: Engine unit tests (Qt-free)
        run: pytest -q

  gui-boot-linux:
    # Qt raster backend needs no GPU; xvfb provides a virtual display.
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen   # belt-and-suspenders alongside xvfb-run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - run: pip install -e ".[gui,dev]"
      - name: GUI imports + constructs a window headless
        run: xvfb-run -a python -c "import sys; from PySide6.QtWidgets import QApplication; from cherrybomb.gui.app import MainWindow; app=QApplication(sys.argv); w=MainWindow(); print('GUI booted headless OK')"

  gate-a-dataviz:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1 libxkbcommon0
      - run: pip install -e ".[gui,dev]"
      - name: Gate A data-viz benchmark (asserts >=30fps, 100k-row table)
        run: xvfb-run -a python spikes/gate_a_dataviz.py --bench --nodes 5000 --rows 100000

  gate-c-packaging:
    # Path-resolution half runs everywhere; browser launch half is exercised in the
    # full build job on a minimal container (Phase 2). Phase 0 = path resolution.
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Gate C path resolution + writable browser cache
        run: python spikes/gate_c_packaging.py --self-test
